name: Build Jar - Artifact

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 临时兼容旧 Action（仅在确实需要时启用）
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install local libs to maven repo (if any)
        run: |
          set -e
          if [ -d libs ]; then
            echo "Found libs/ directory — installing any jars to local maven repository"
            for f in libs/*.jar; do
              if [ -f "$f" ]; then
                echo "Installing $f to local maven repo"
                mvn org.apache.maven.plugins:maven-install-plugin:3.1.0:install-file \
                  -Dfile="$f" \
                  -DgroupId=local.libs \
                  -DartifactId="$(basename "$f" .jar)" \
                  -Dversion=1.0 \
                  -Dpackaging=jar || true
              fi
            done
          else
            echo "No libs/ directory found, skipping local installs"
          fi

      - name: Detect build system and build (debug)
        id: build
        run: |
          set -e
          echo ">>> Java and Maven info"
          java -version || true
          mvn -v || true
          ARTIFACT=""

          if [ -f pom.xml ]; then
            echo "Detected Maven project (pom.xml)"
            mvn -B -DskipTests -e package
            ARTIFACT=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "Detected Gradle project"
            if [ -f gradlew ]; then
              chmod +x ./gradlew
              ./gradlew build -x test
            else
              gradle build -x test
            fi
            ARTIFACT=$(ls build/libs/*.jar 2>/dev/null | head -n 1 || true)
          else
            echo "No pom.xml or Gradle build files found — attempting Maven package by default"
            mvn -B -DskipTests -e package || true
            ARTIFACT=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          fi

          echo "==== build output: listing artifact locations ===="
          ls -la target 2>/dev/null || true
          ls -la build/libs 2>/dev/null || true
          echo "=============================================="

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact produced by build. Exiting with failure."
            exit 1
          fi

          echo "Found artifact: $ARTIFACT"
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename "$ARTIFACT")" >> $GITHUB_OUTPUT

      - name: Upload build artifact for manual download
        uses: actions/upload-artifact@v4
        with:
          name: variablemanager-${{ github.sha }}
          path: ${{ steps.build.outputs.artifact }}
