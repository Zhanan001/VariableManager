name: Build Jar - Artifact

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 临时允许使用已弃用的 Node 20 以兼容旧 Action（仅在确实需要时启用）
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install local libs to local maven repo (if any)
        run: |
          set -e
          if [ -d libs ]; then
            echo "Found libs/ directory — installing jars to local maven repo" | tee -a build.log || true
            for f in libs/*.jar; do
              if [ -f "$f" ]; then
                echo "Installing $f to local maven repo" | tee -a build.log || true
                mvn org.apache.maven.plugins:maven-install-plugin:3.1.0:install-file \
                  -Dfile="$f" \
                  -DgroupId=local.libs \
                  -DartifactId="$(basename "$f" .jar)" \
                  -Dversion=1.0 \
                  -Dpackaging=jar >> build.log 2>&1 || true
              fi
            done
          else
            echo "No libs/ directory found, skipping local installs" | tee -a build.log || true
          fi

      - name: Build (Maven/Gradle auto-detect)
        id: run_build
        run: |
          set -e
          # start/overwrite build log
          echo "=== Build log for run $GITHUB_SHA ===" > build.log
          echo "" >> build.log

          echo "Java version:" >> build.log
          java -version >> build.log 2>&1 || true

          echo "Maven version:" >> build.log
          mvn -v >> build.log 2>&1 || true

          ART=""

          if [ -f pom.xml ]; then
            echo "Detected Maven project (pom.xml)" | tee -a build.log
            mvn -B -DskipTests package >> build.log 2>&1
            ART=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "Detected Gradle project" | tee -a build.log
            if [ -f gradlew ]; then
              chmod +x ./gradlew
              ./gradlew build -x test >> build.log 2>&1
            else
              gradle build -x test >> build.log 2>&1
            fi
            ART=$(ls build/libs/*.jar 2>/dev/null | head -n 1 || true)
          else
            echo "No pom.xml or Gradle build files found — attempting Maven package by default" | tee -a build.log
            mvn -B -DskipTests package >> build.log 2>&1
            ART=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          fi

          echo "" >> build.log
          echo "==== directory listings ====" >> build.log
          ls -la target 2>/dev/null >> build.log 2>&1 || true
          ls -la build/libs 2>/dev/null >> build.log 2>&1 || true
          echo "============================" >> build.log

          # export artifact info for downstream steps
          echo "artifact=$ART" >> $GITHUB_OUTPUT
          if [ -n "$ART" ]; then
            echo "artifact_name=$(basename "$ART")" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi

      - name: Upload jar artifact (on success)
        if: success() && steps.run_build.outputs.artifact != ''
        uses: actions/upload-artifact@v4
        with:
          name: built-jar-${{ github.sha }}
          path: ${{ steps.run_build.outputs.artifact }}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
