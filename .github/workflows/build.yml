name: Build Jar - Artifact

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 临时允许使用已弃用的 Node 20（如果你之前遇到 Node 20 警告并需要兼容旧 Action，可启用；长期请移除）
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install local libs to maven repo (if any)
        run: |
          set -e
          if [ -d libs ]; then
            echo "Found libs/ directory — installing any jars to local maven repository"
            for f in libs/*.jar; do
              if [ -f "$f" ]; then
                echo "Installing $f to local maven repo"
                mvn org.apache.maven.plugins:maven-install-plugin:3.1.0:install-file \
                  -Dfile="$f" \
                  -DgroupId=local.libs \
                  -DartifactId=$(basename "$f" .jar) \
                  -Dversion=1.0 \
                  -Dpackaging=jar || true
              fi
            done
          else
            echo "No libs/ directory found, skipping local installs"
          fi

      - name: Detect build system and build (debuggable)
        id: build
        run: |
          set -e
          echo ">>> Java and Maven info"
          java -](#)
