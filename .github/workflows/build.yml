name: Android Build (assemble + artifacts)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 临时兼容旧 Action（如无必要可删除）
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      - name: Ensure gradlew is executable
        run: |
          if [ -f ./gradlew ]; then chmod +x ./gradlew; fi

      - name: Install optional local libs (libs/*.jar) to local maven repo
        run: |
          set -e
          echo "=== Installing local libs (if any) ===" > build.log 2>&1 || true
          if [ -d libs ]; then
            for f in libs/*.jar; do
              if [ -f "$f" ]; then
                echo "Install $f" | tee -a build.log
                mvn org.apache.maven.plugins:maven-install-plugin:3.1.0:install-file \
                  -Dfile="$f" \
                  -DgroupId=local.libs \
                  -DartifactId="$(basename "$f" .jar)" \
                  -Dversion=1.0 \
                  -Dpackaging=jar >> build.log 2>&1 || true
              fi
            done
          else
            echo "No libs/ directory found" | tee -a build.log
          fi

      - name: Install Android SDK & build with Gradle (uses emulator-runner to setup SDK)
        id: android_build
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: "-no-window -no-audio"
          script: |
            set -e
            echo "=== Gradle build start ===" >> build.log 2>&1
            if [ -f ./gradlew ]; then
              ./gradlew assembleRelease -x test >> build.log 2>&1 || BUILD_FAILED=1
              ./gradlew assembleDebug -x test >> build.log 2>&1 || true
            else
              gradle assembleRelease -x test >> build.log 2>&1 || BUILD_FAILED=1
              gradle assembleDebug -x test >> build.log 2>&1 || true
            fi

            # collect apk path (first match)
            APK=$(find app/build/outputs -type f -name "*.apk" | head -n 1 || true)
            if [ -n "$APK" ]; then
              echo "apk=$APK" >> $GITHUB_OUTPUT
            else
              echo "apk=" >> $GITHUB_OUTPUT
            fi

            if [ ! -z "$BUILD_FAILED" ]; then
              echo "GRADLE_BUILD_FAILED=1" >> $GITHUB_OUTPUT
              exit 1
            fi

      - name: Print build.log (for debugging)
        if: always()
        run: |
          echo "==== BEGIN build.log ===="
          if [ -f build.log ]; then
            sed -n '1,2000p' build.log || true
          else
            echo "build.log not found"
          fi
          echo "==== END build.log ===="

      - name: Upload APK artifact (if built)
        if: success() && steps.android_build.outputs.apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: ${{ steps.android_build.outputs.apk }}

      - name: Upload all APKs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks-all-${{ github.sha }}
          path: app/build/outputs/**/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
