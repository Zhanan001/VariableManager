name: Build Jar - Artifact

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Detect build system and build
        id: build
        run: |
          set -e
          ARTIFACT=""

          if [ -f pom.xml ]; then
            echo "Detected Maven project (pom.xml)"
            mvn -B -DskipTests package
            ARTIFACT=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "Detected Gradle project"
            if [ -f gradlew ]; then
              chmod +x ./gradlew
              ./gradlew build -x test
            else
              gradle build -x test
            fi
            ARTIFACT=$(ls build/libs/*.jar 2>/dev/null | head -n 1 || true)
          else
            echo "No pom.xml or Gradle build files found — attempting Maven package by default"
            mvn -B -DskipTests package || true
            ARTIFACT=$(ls target/*.jar 2>/dev/null | head -n 1 || true)
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact produced by build. Listing directories for debugging:"
            echo "---- target ----"
            ls -la target || true
            echo "---- build/libs ----"
            ls -la build/libs || true
            echo "Exiting with failure (no jar found)"
            exit 1
          fi

          echo "Found artifact: $ARTIFACT"
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename "$ARTIFACT")" >> $GITHUB_OUTPUT

      - name: Upload build artifact for manual download
        uses: actions/upload-artifact@v4
        with:
          name: variablemanager-${{ github.sha }}
          path: ${{ steps.build.outputs.artifact }}
